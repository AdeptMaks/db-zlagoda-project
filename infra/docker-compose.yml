services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: zlagoda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    # volumes:
      # - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zlagoda"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Api/Dockerfile
      target: api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=zlagoda;Username=postgres;Password=yourpassword"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: ..
      dockerfile: Api/Dockerfile
      target: api
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=zlagoda;Username=postgres;Password=yourpassword"
      MIGRATE_ONLY: "true"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
      target: client
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
